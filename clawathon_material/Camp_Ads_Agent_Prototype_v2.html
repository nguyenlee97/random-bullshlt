<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Ads Agent · Split Chat + Workspace</title>
<style>
  :root{
    --green:#1F7A3D; --green-d:#145C2C; --green-l:#E8F3EC; --green-l2:#F4F8F5;
    --amber:#9A6700; --amber-l:#FFF6E5; --red:#B00020; --red-l:#FCEAEC;
    --blue:#185FA5; --blue-l:#E6F1FB; --violet:#5b3aa6; --violet-l:#EEEBFA;
    --ink:#16241b; --muted:#5b6b60; --line:#dbe5de; --white:#fff;
    --r:14px; --rs:10px; --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --shadow:0 1px 3px rgba(20,60,40,.07),0 8px 28px rgba(20,60,40,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);background:#eef3f0;line-height:1.55;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  .app{max-width:1280px;margin:14px auto;background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);min-height:94vh;display:flex;flex-direction:column}
  .bar{display:flex;align-items:center;gap:14px;padding:11px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.96)}
  .logo{font-weight:800;color:var(--green-d);letter-spacing:-.3px}
  .logo span{color:var(--amber)}
  .bar .spacer{margin-left:auto}
  .ghost{border:1px solid var(--line);background:#fff;color:var(--green-d);font-weight:700;font-size:13px;padding:7px 12px;border-radius:999px}
  .ghost:hover{background:var(--green-l2)}

  .main{flex:1;display:flex;min-height:0}
  .pane{display:flex;flex-direction:column;min-width:0}
  .pane.left{flex:0 0 42%;border-right:1px solid var(--line);background:var(--green-l2)}
  .pane.right{flex:1;background:#fff}
  .ph{padding:10px 18px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;background:#fff}
  .left .ph{background:var(--green-l2)}
  .ph .badge{font-size:10.5px;font-weight:800;letter-spacing:.4px;padding:2px 8px;border-radius:999px;text-transform:uppercase}
  .ph .badge.chat{background:var(--blue-l);color:var(--blue)}
  .ph .badge.work{background:var(--violet-l);color:var(--violet)}

  /* ===== LEFT: CHAT ===== */
  .thread{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;gap:10px;max-width:90%}
  .msg .av{flex:0 0 32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
  .msg.bot .av{background:var(--green)}
  .msg.me .av{background:var(--blue)}
  .msg.me{align-self:flex-end;flex-direction:row-reverse}
  .bub{padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.55}
  .msg.bot .bub{background:#fff;border:1px solid var(--line);border-top-left-radius:4px;box-shadow:var(--shadow)}
  .msg.me .bub{background:var(--blue);color:#fff;border-top-right-radius:4px}
  .msg .bub .tool{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:10.5px;font-weight:700;color:var(--green-d);background:var(--green-l);border:1px solid #cbe4d2;padding:2px 8px;border-radius:999px}
  .msg .bub .tool.gemma{color:var(--violet);background:var(--violet-l);border-color:#d8cdf2}
  .msg .bub .stepref{display:inline-flex;align-items:center;gap:5px;background:var(--violet-l);color:var(--violet);border:1px solid #d8cdf2;border-radius:6px;padding:2px 8px;font-size:11.5px;font-weight:700;margin-top:6px;text-decoration:none}
  .msg .bub .stepref::before{content:"→";font-weight:900}
  .statusbub{align-self:flex-start;display:inline-flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);background:#fff;border:1px solid var(--line);padding:9px 13px;border-radius:13px}
  .spin{width:14px;height:14px;border:2px solid #d7e2db;border-top-color:var(--green);border-radius:50%;animation:s .7s linear infinite;flex:0 0 auto}
  @keyframes s{to{transform:rotate(360deg)}}

  .composer{border-top:1px solid var(--line);padding:12px 16px;background:#fff}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px}
  .chip{border:1px solid #bfe0c9;background:var(--green-l);color:var(--green-d);border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:600}
  .chip:hover{background:#d9eede}
  .inrow{display:flex;gap:8px}
  .inrow input{flex:1;border:1px solid var(--line);border-radius:var(--rs);padding:11px 14px;font-family:inherit;font-size:14px;background:#fff}
  .inrow input:focus{outline:none;border-color:var(--green)}
  .btn{background:var(--green);color:#fff;border:none;font-weight:700;font-size:14px;padding:10px 18px;border-radius:var(--rs)}
  .btn:hover{background:var(--green-d)}
  .btn.sec{background:#fff;color:var(--green-d);border:1px solid var(--line)}
  .btn.amber{background:var(--amber);color:#fff}
  .btn.danger{background:var(--red);color:#fff}
  .btn.big{font-size:15px;padding:12px 22px}
  .btn[disabled]{opacity:.45;cursor:not-allowed}

  /* ===== RIGHT: WORKSPACE ===== */
  .workspace{flex:1;display:flex;flex-direction:column;min-height:0}
  .stepper-wrap{padding:14px 22px 6px;border-bottom:1px solid var(--line);background:#fcfdfc}
  .stepper{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .stp{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:999px;background:#f1f5f2;border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap}
  .stp .n{width:18px;height:18px;border-radius:50%;background:#cdd8d0;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px}
  .stp.done{color:var(--green-d);background:var(--green-l);border-color:#bfe0c9}
  .stp.done .n{background:var(--green)}
  .stp.cur{color:#fff;background:var(--green);border-color:var(--green)}
  .stp.cur .n{background:#fff;color:var(--green)}
  .stp.hero .n{box-shadow:0 0 0 2px #DCCCFF}
  .stp.locked{opacity:.55;cursor:not-allowed}
  .progress-line{height:4px;background:#eef3f0;border-radius:2px;margin-top:10px;overflow:hidden}
  .progress-line span{display:block;height:100%;background:linear-gradient(90deg,var(--green),#5fd07a);transition:.4s}

  .work-body{flex:1;overflow-y:auto;padding:22px 24px}
  .step-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .step-head .num{width:36px;height:36px;border-radius:50%;background:var(--green-l);color:var(--green-d);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;border:1.5px solid #bfe0c9}
  .step-head.done .num{background:var(--green);color:#fff;border-color:var(--green)}
  .step-head h2{font-size:20px;letter-spacing:-.3px}
  .step-head .hb{font-size:10.5px;font-weight:800;letter-spacing:.5px;padding:3px 9px;border-radius:999px;background:var(--violet-l);color:var(--violet);text-transform:uppercase;margin-left:6px}
  .step-desc{color:var(--muted);font-size:13.5px;margin-bottom:14px;padding-left:46px}

  .label{font-size:11.5px;font-weight:700;color:var(--amber);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  .label:first-child{margin-top:4px}
  .ipt,textarea,select{width:100%;border:1px solid var(--line);border-radius:var(--rs);padding:10px 12px;font-family:inherit;font-size:14px;background:#fff}
  textarea{resize:vertical}
  .ipt:focus,textarea:focus,select:focus{outline:none;border-color:var(--green)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* Footer action bar */
  .work-foot{border-top:1px solid var(--line);padding:14px 22px;background:#fcfdfc;display:flex;align-items:center;gap:12px}
  .work-foot .hint{font-size:12px;color:var(--muted);flex:1}
  .work-foot .hint b{color:var(--green-d)}

  /* Upload + phone */
  .drop{border:2px dashed #c4d6cb;border-radius:var(--rs);padding:18px;text-align:center;color:var(--muted);font-size:13px;background:var(--green-l2);cursor:pointer;display:block}
  .drop:hover{border-color:var(--green)}
  .drop.has{border-style:solid;border-color:var(--green);background:#fff;text-align:left}
  .drop b{color:var(--green-d)}
  .creative-wrap{display:grid;grid-template-columns:1fr 250px;gap:18px;align-items:start}
  .phone{width:230px;margin:0 auto;background:#0b0d12;border-radius:30px;padding:9px;box-shadow:0 12px 32px rgba(0,0,0,.18)}
  .phone .notch{height:16px;width:78px;background:#0b0d12;border-radius:0 0 13px 13px;margin:0 auto 3px}
  .phone-screen{background:#fff;border-radius:22px;overflow:hidden;height:420px;display:flex;flex-direction:column;font-size:11px}
  .ph-bar{height:22px;background:#f1f5f2;display:flex;align-items:center;justify-content:space-between;padding:0 11px;font-size:9.5px;color:#999;font-weight:700}
  .ph-feed{flex:1;overflow:hidden;display:flex;flex-direction:column}
  .ph-post{padding:7px 9px;border-bottom:1px solid #eee}
  .ph-post .au{display:flex;align-items:center;gap:5px;margin-bottom:3px}
  .ph-post .av2{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#ff6a3d,#ffae3d)}
  .ph-post .nm{font-weight:700;font-size:9.5px}
  .ph-post .tx{font-size:9.5px;color:#333}
  .ph-ad{padding:8px;border:1px solid #e3e7ea;border-radius:7px;margin:7px;background:#fafbfd;position:relative}
  .ph-ad::before{content:"Tài trợ";position:absolute;top:-6px;left:7px;background:var(--amber);color:#fff;font-size:7.5px;font-weight:700;padding:1px 5px;border-radius:5px}
  .ph-ad .pic{height:125px;border-radius:5px;background:linear-gradient(135deg,#1F7A3D 0%,#5fd07a 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;text-align:center;padding:8px;overflow:hidden}
  .ph-ad .pic img{max-width:100%;max-height:100%;object-fit:contain}
  .ph-ad h5{font-size:10.5px;font-weight:800;margin:6px 0 2px;color:#16241b}
  .ph-ad p{font-size:9px;color:#5b6b60}
  .ph-ad .cta{margin-top:6px;background:var(--green);color:#fff;text-align:center;font-size:9.5px;font-weight:700;padding:5px;border-radius:5px}

  /* Attr picker */
  .attr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .attr{border:1px solid var(--line);border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:8px;cursor:pointer;background:#fff;font-size:13px;transition:.15s}
  .attr:hover{border-color:var(--green);background:var(--green-l2)}
  .attr.sel{border-color:var(--green);background:var(--green-l)}
  .attr .ck{width:15px;height:15px;border:1.5px solid #c4d6cb;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex:0 0 auto}
  .attr.sel .ck{background:var(--green);border-color:var(--green)}
  .attr .sz{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600}
  .attr.sel .sz{color:var(--green-d)}
  .size-meter{background:var(--green-l2);border:1px solid #bfe0c9;border-radius:var(--rs);padding:11px 14px;margin-top:12px;display:flex;align-items:center;gap:14px}
  .size-meter .big{font-size:22px;font-weight:800;color:var(--green-d)}
  .size-meter .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}

  /* Camp rows */
  .camp-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:var(--rs);background:#fff;margin-bottom:8px}
  .camp-row .nm{font-weight:700;font-size:13.5px}
  .camp-row .hint2{font-size:11.5px;color:var(--muted)}
  .camp-row .st{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .camp-row .st.run{background:var(--green-l);color:var(--green-d)}
  .camp-row .st.pause{background:var(--amber-l);color:var(--amber)}
  .camp-row .st.draft{background:#f1f5f2;color:var(--muted)}
  .camp-row button{font-size:11.5px;padding:5px 10px}

  /* Success */
  .success-hero{text-align:center;padding:14px 0}
  .success-hero .ic{width:64px;height:64px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px;animation:pop .4s ease-out}
  @keyframes pop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  .success-hero h3{font-size:18px;color:var(--green-d);margin-bottom:3px}
  .success-hero p{color:var(--muted);font-size:13px}

  /* Chart */
  .chart-card{background:#fff;border:1px solid var(--line);border-radius:var(--rs);padding:14px;margin-top:10px}
  .chart-card h4{font-size:13px;color:var(--green-d);margin-bottom:8px}
  .chart-card svg{display:block;width:100%;height:auto}
  .legend{display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:-1px}

  /* Mini table */
  table.mini{width:100%;border-collapse:collapse;font-size:12.5px}
  table.mini th{background:var(--green);color:#fff;text-align:left;padding:6px 8px;font-size:11.5px}
  table.mini td{padding:6px 8px;border-top:1px solid var(--line)}

  /* Email */
  .email-card{background:#fff;border:1px solid var(--line);border-radius:var(--rs);padding:14px}
  .email-card .hdr{display:grid;grid-template-columns:70px 1fr;gap:5px 10px;font-size:13px;padding-bottom:9px;border-bottom:1px solid var(--line);margin-bottom:10px}
  .email-card .hdr b{color:var(--muted);font-weight:600}
  .email-card .body{font-size:13px;line-height:1.6;white-space:pre-wrap}

  /* Done view (read-only summary for completed step) */
  .done-card{background:var(--green-l2);border:1px solid #bfe0c9;border-radius:var(--rs);padding:14px 16px;margin-bottom:14px}
  .done-card h4{color:var(--green-d);font-size:13.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .done-card h4::before{content:"✓";background:var(--green);color:#fff;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
  .kv{font-size:13px;display:grid;grid-template-columns:120px 1fr;gap:5px 10px}
  .kv b{color:var(--muted);font-weight:600}

  .pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;display:inline-block}
  .pill.aw{background:var(--blue-l);color:var(--blue)} .pill.good{background:var(--green-l);color:var(--green-d)}
  .pill.bad{background:var(--red-l);color:var(--red)} .pill.watch{background:var(--amber-l);color:var(--amber)}
  .doneconfirm{background:var(--green-l);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:10px 13px;font-size:13.5px;color:var(--green-d);font-weight:600}
  .alert{border-left:3px solid var(--amber);background:var(--amber-l);padding:9px 12px;border-radius:0 8px 8px 0;font-size:13px;margin-top:10px}
  .alert .t{font-weight:700;color:var(--amber);margin-bottom:2px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:50;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .dot{width:8px;height:8px;border-radius:50%;background:#5fd07a}

  /* Highlight pulse for right panel when agent pushes new content */
  @keyframes flash{0%{box-shadow:inset 0 0 0 3px rgba(31,122,61,0)}40%{box-shadow:inset 0 0 0 3px rgba(31,122,61,.35)}100%{box-shadow:inset 0 0 0 3px rgba(31,122,61,0)}}
  .work-body.flash{animation:flash 1s ease-out}

  @media(max-width:980px){.pane.left{flex:0 0 50%}.creative-wrap{grid-template-columns:1fr}.attr-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div class="logo">Camp <span>Ads</span> Agent</div>
    <span style="font-size:12px;color:var(--muted);font-weight:600">v2 · Split Chat ↔ Workspace</span>
    <div class="spacer"></div>
    <button class="ghost" onclick="restart()">↻ Reset</button>
  </div>
  <section class="main">
    <!-- LEFT: CHAT -->
    <div class="pane left">
      <div class="ph"><span class="badge chat">CHAT</span>Trao đổi với Agent</div>
      <div class="thread" id="thread"></div>
      <div class="composer" id="composer"></div>
    </div>
    <!-- RIGHT: WORKSPACE -->
    <div class="pane right">
      <div class="ph"><span class="badge work">WORKSPACE</span>Form &amp; kết quả · bước hiện tại</div>
      <div class="workspace">
        <div class="stepper-wrap">
          <div class="stepper" id="stepper"></div>
          <div class="progress-line"><span id="progLine" style="width:0%"></span></div>
        </div>
        <div class="work-body" id="workBody"></div>
        <div class="work-foot" id="workFoot"></div>
      </div>
    </div>
  </section>
</div>
<div class="toast" id="toast"><span class="dot"></span><span id="toastTx"></span></div>

<script>
/* ========= STEPS META ========= */
const STEPS = [
  { id:"brief",    title:"Brief",            hero:false, tool:"brief_parse",                  model:"qwen",
    intro:"Mình bắt đầu nhé. Em đã mở form Brief ở panel bên phải — anh điền objective + KPI + ngân sách. Nếu cần em gợi ý thêm, cứ hỏi em ở khung chat này.",
    desc:"Điền brief khách hàng — em sẽ chuẩn hóa về schema JSON và đề xuất KPI phù hợp objective." },
  { id:"creative", title:"Creative",         hero:false, tool:"creative_upload",              model:"qwen",
    intro:"Bước 2 — Upload material ở panel phải. Em hiện preview ngay trên màn hình điện thoại để anh check format.",
    desc:"Ad Opt upload creative (ảnh / video). Preview hiển thị bên cạnh để verify ratio & nội dung." },
  { id:"segment",  title:"Audience",         hero:true,  tool:"dmp_match.py",                 model:"gemma",
    intro:"🎯 Bước 3 — Em đã load file dmp_attributes.json (8 tệp khả dụng). Anh chọn attribute phù hợp, audience size tự tính theo logic giao tệp.",
    desc:"Chọn attributes từ DMP. Size = min(các tệp) × discount overlap 22%/tệp." },
  { id:"setup",    title:"Setup Camp",       hero:false, tool:"camp_create",                  model:"gemma",
    intro:"Bước 4 — Em đã chia sẵn ngân sách 3 zone tối ưu CPM. Bấm 'Tạo tất cả' ở panel phải để khởi tạo, có thể pause/run từng camp.",
    desc:"3 camp ads draft sẵn theo zone. Tạo + pause/run từng camp tuỳ ý." },
  { id:"success",  title:"Thành công",       hero:false, tool:"notify",                       model:"qwen",
    intro:"🎉 Bước 5 — Camp ads đã tạo. Em tổng kết setup ở panel phải.",
    desc:"Tổng kết camp ads vừa tạo. Bấm đồng ý để sang phân tích báo cáo." },
  { id:"report",   title:"Phân tích Report", hero:true,  tool:"report_extract + chart_render", model:"gemma",
    intro:"📊 Bước 6 — Anh muốn em phân tích báo cáo 500 camps chứ? Bấm 'Phân tích' ở panel phải, em sẽ vào file CSV, extract dữ liệu, vẽ chart và đề xuất hành động.",
    desc:"Extract camps_report.csv · vẽ chart performance · LLM đánh giá outlier · đề xuất action." },
  { id:"email",    title:"Email Teams",      hero:false, tool:"email_compose + smtp_send",    model:"qwen",
    intro:"Bước cuối — Em soạn email tổng kết. Review ở panel phải rồi bấm gửi cho Account team + Ad Opt team.",
    desc:"Gửi email kèm tóm tắt + đề xuất cho Account team và Ad Opt team." },
];
const N=STEPS.length;

const ATTRIBUTES = [
  { k:"travel_intent_sea",  name:"Travel Intent · SEA",        size:1850000 },
  { k:"air_travel",         name:"Air Travel Enthusiast",      size:2200000 },
  { k:"hotel_booker",       name:"Hotel Booker (3m)",          size:1430000 },
  { k:"credit_card_user",   name:"Credit Card Active User",    size:3100000 },
  { k:"fintech_high_value", name:"Fintech High-Value Segment", size:680000  },
  { k:"hcm_hn_dn",          name:"GEO · HCM / HN / ĐN",        size:5200000 },
  { k:"age_25_44",          name:"Age 25-44",                  size:8900000 },
  { k:"premium_lifestyle",  name:"Premium Lifestyle",          size:920000  },
];

/* ========= STATE ========= */
let cur=0;
let status=STEPS.map(()=>'pending');
let busy=false;
let log=[];
const state = {
  brief: { brand:"Brand A", objective:"awareness", kpi:"Reach + VTR", budget:425, duration:4, notes:"Tăng nhận biết nhóm 18+ quan tâm du lịch SEA" },
  creative: { uploaded:false, fileName:"", fileType:"", dataUrl:"", headline:"Tự tin vi vu SEA", subtext:"Một thẻ — cả Đông Nam Á trong tầm tay" },
  segment: { attrs:[], size:0 },
  setup: { camps:[
    { id:"CA-001", name:"Brand A · Awareness · Zone Tin tức",   budget:"45%", bid:"55.000đ CPM", st:"draft" },
    { id:"CA-002", name:"Brand A · Awareness · Zone Giải trí",  budget:"35%", bid:"48.000đ CPM", st:"draft" },
    { id:"CA-003", name:"Brand A · Awareness · Zone Du lịch",   budget:"20%", bid:"52.000đ CPM", st:"draft" },
  ], created:false },
  report: { analyzed:false },
  email:  { sent:false }
};

/* ========= UTILS ========= */
function fmt(n){ if(n>=1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/,"")+"M"; if(n>=1e3) return (n/1e3).toFixed(0)+"K"; return n.toString(); }
function toast(tx){ const t=document.getElementById('toast'); document.getElementById('toastTx').textContent=tx; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),1700); }
function scrollEnd(){ const t=document.getElementById('thread'); t.scrollTop=t.scrollHeight; }
function pushBot(html,opts){ log.push({who:'bot',html:html,tool:opts&&opts.tool,model:opts&&opts.model,ref:opts&&opts.ref}); renderThread(); }
function pushMe(html){ log.push({who:'me',html:html}); renderThread(); }
function pushStatus(html,tool){ log.push({who:'status',html:html,tool:tool}); renderThread(); }
function clearStatus(){ log=log.filter(m=>m.who!=='status'); }
function flashWork(){ const el=document.getElementById('workBody'); el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }

/* ========= STEPPER ========= */
function renderStepper(){
  const el=document.getElementById('stepper'); el.innerHTML='';
  STEPS.forEach((s,i)=>{
    const reach = status[i]==='done' || i<=cur;
    const d=document.createElement('div');
    d.className='stp'+(status[i]==='done'?' done':'')+(i===cur?' cur':'')+(s.hero?' hero':'')+(reach?'':' locked');
    d.innerHTML=`<span class="n">${status[i]==='done'?'✓':(i+1)}</span>${s.title}`;
    if(reach) d.onclick=()=>jumpStep(i);
    el.appendChild(d);
  });
  const done = status.filter(s=>s==='done').length;
  document.getElementById('progLine').style.width = Math.round((done/N)*100)+'%';
}

/* ========= NAVIGATION ========= */
function jumpStep(i){
  if(busy) return;
  cur=i;
  renderAll();
  flashWork();
}
function goBack(){
  if(cur===0 || busy) return;
  cur--;
  renderAll();
}
function approveCurrent(){
  if(busy) return;
  const s=STEPS[cur];
  // step-specific validation handled inside renderStep approveBtn enable/disable
  status[cur]='done';
  pushMe(`✓ Đã đồng ý bước "${s.title}"`);
  pushBot(`Tốt! Em ghi nhận bước ${s.title} ✓.`+(cur<N-1?` Em chuyển sang bước "${STEPS[cur+1].title}" ở panel phải nhé.`:` Quy trình hoàn tất 🎉`), {tool:s.tool, model:s.model});
  if(cur<N-1){
    cur++;
    setTimeout(()=>{
      pushBot(STEPS[cur].intro, {tool:STEPS[cur].tool, model:STEPS[cur].model, ref:STEPS[cur].title});
      renderAll();
      flashWork();
    }, 350);
  } else {
    renderAll();
  }
}

/* ========= RIGHT PANE: STEP RENDERERS ========= */
const stepRenderers = [renderBrief, renderCreative, renderSegment, renderSetup, renderSuccess, renderReport, renderEmail];

function renderAll(){
  renderStepper();
  // If step is done & not the current one being re-edited, show done view
  const body=document.getElementById('workBody');
  const s=STEPS[cur];
  const headHTML = `<div class="step-head${status[cur]==='done'?' done':''}">
      <div class="num">${status[cur]==='done'?'✓':(cur+1)}</div>
      <h2>${s.title}${s.hero?'<span class="hb">Hero · AI sâu</span>':''}</h2>
    </div>
    <div class="step-desc">${s.desc}</div>`;
  body.innerHTML = headHTML + stepRenderers[cur]();
  bindStep(cur);
  renderFoot();
}

function renderFoot(){
  const s=STEPS[cur];
  const can = canApprove(cur);
  const isDone = status[cur]==='done';
  const last = cur===N-1;
  document.getElementById('workFoot').innerHTML = `
    <div class="hint">Tool: <b>${s.tool}</b> · ${s.model==='gemma'?'Gemma-4-31b':'Qwen3.6-27b'}</div>
    ${cur>0?'<button class="btn sec" onclick="goBack()">← Quay lại</button>':''}
    ${isDone
      ? (last?'<button class="btn big" onclick="toast(\'Quy trình đã hoàn tất\')">✓ Đã hoàn tất</button>':'<button class="btn big" onclick="jumpStep('+(cur+1)+')">Đi tới bước tiếp →</button>')
      : '<button class="btn big" id="apvBtn" '+(can?'':'disabled')+' onclick="approveCurrent()">'+(last?'✓ Đồng ý &amp; hoàn tất':'✓ Đồng ý &amp; tiếp tục')+'</button>'}
  `;
}

function canApprove(i){
  if(i===1) return state.creative.uploaded;
  if(i===2) return state.segment.attrs.length>0;
  if(i===3) return state.setup.created;
  if(i===5) return state.report.analyzed;
  if(i===6) return state.email.sent;
  return true;
}

function bindStep(i){
  if(i===0){
    ['f_brand','f_obj','f_kpi','f_budget','f_dur','f_notes'].forEach(id=>{
      const el=document.getElementById(id); if(!el) return;
      el.addEventListener('input',()=>{
        state.brief.brand=document.getElementById('f_brand').value;
        state.brief.objective=document.getElementById('f_obj').value;
        state.brief.kpi=document.getElementById('f_kpi').value;
        state.brief.budget=+document.getElementById('f_budget').value||0;
        state.brief.duration=+document.getElementById('f_dur').value||0;
        state.brief.notes=document.getElementById('f_notes').value;
      });
    });
  }
  if(i===1){
    const fi=document.getElementById('fileIn');
    if(fi) fi.addEventListener('change',e=>{
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=()=>{
        state.creative.uploaded=true;
        state.creative.fileName=f.name;
        state.creative.fileType=f.type||"unknown";
        state.creative.dataUrl=r.result;
        renderAll();
        toast('✓ Upload xong — preview live');
        pushBot(`Đã nhận file <b>${f.name}</b>. Preview hiển thị trên phone bên panel phải.`, {tool:STEPS[1].tool, model:STEPS[1].model});
      };
      r.readAsDataURL(f);
    });
    ['c_head','c_sub'].forEach(id=>{
      const el=document.getElementById(id); if(!el) return;
      el.addEventListener('input',()=>{
        state.creative.headline=document.getElementById('c_head').value;
        state.creative.subtext=document.getElementById('c_sub').value;
        renderAll();
      });
    });
  }
}

    // already approved — show summary

    <div class="label">Objective (mục tiêu)</div>
    <select id="f_obj">

/* ========= STEP 2: CREATIVE ========= */

        : `<span>${c.fileName}</span>`)

    <div>

    <div>
      <div class="label" style="text-align:center;margin-top:0">Phone preview</div>
      <div class="phone">
        <div class="notch"></div>
        <div class="phone-screen">
          <div class="ph-bar"><span>9:41</span><span>● ● ●</span></div>
          <div class="ph-feed">
            <div class="ph-post"><div class="au"><div class="av2"></div><div class="nm">Adtima News</div></div><div class="tx">Tin nóng sáng nay...</div></div>
            <div class="ph-ad">
              <div class="pic">${preview}</div>
              <h5>${c.headline||"Headline"}</h5>
              <p>${c.subtext||"Sub-text mô tả."}</p>

/* ========= STEP 3: AUDIENCE ========= */
function recalcSize(){
  if(!state.segment.attrs.length){ state.segment.size=0; return; }
  const sizes=state.segment.attrs.map(k=>ATTRIBUTES.find(a=>a.k===k).size);
  let s=Math.min(...sizes);
  s = Math.round(s * Math.pow(0.78, state.segment.attrs.length-1));
  state.segment.size=s;
}
function toggleAttr(k){
  const i=state.segment.attrs.indexOf(k);
  if(i>=0) state.segment.attrs.splice(i,1); else state.segment.attrs.push(k);
  recalcSize();
  renderAll();
}
function renderSegment(){
  const sel=state.segment.attrs;
  return `<div>
    <div class="label" style="margin-top:0">Attributes từ file dmp_attributes.json · 8 tệp</div>
    <div class="attr-grid">
      ${ATTRIBUTES.map(a=>`
        <div class="attr ${sel.includes(a.k)?'sel':''}" onclick="toggleAttr('${a.k}')">
          <div class="ck">${sel.includes(a.k)?'✓':''}</div>
          <span>${a.name}</span>
          <span class="sz">${fmt(a.size)}</span>
        </div>`).join("")}
    </div>
    <div class="size-meter">
      <div><div class="lab">Audience size ước lượng</div><div class="big">${fmt(state.segment.size)}</div></div>
      <div style="flex:1"></div>
      <div style="text-align:right">
        <div class="lab">Đã chọn</div>
        <div style="font-weight:700;color:var(--green-d)">${sel.length} attributes</div>
      </div>
    </div>
    ${sel.length===0?'<div class="alert"><div class="t">⚠ Chưa chọn attribute</div>Chọn ít nhất 1 attribute để tính size và đồng ý.</div>':''}
  </div>`;
}

/* ========= STEP 4: SETUP ========= */
function createCamps(){
  if(busy) return; busy=true;
  pushStatus("Đang gọi Ad Server API · khởi tạo 3 camp...", STEPS[3].tool);
  setTimeout(()=>{
    clearStatus();
    state.setup.camps.forEach(c=>c.st='run');
    state.setup.created=true;
    pushBot("Đã khởi tạo 3 camp ads ✓ — trạng thái Running. Anh có thể pause từng camp ở panel phải.", {tool:STEPS[3].tool, model:STEPS[3].model});
    busy=false;
    renderAll();
    flashWork();
  }, 1100);
}
function toggleCamp(i){
  const c=state.setup.camps[i];
  c.st = c.st==='run'?'pause':'run';
  toast(c.st==='run'?`▶ Resumed ${c.id}`:`❚❚ Paused ${c.id}`);
  renderAll();
}
function renderSetup(){
  const camps=state.setup.camps;
  const allCreated=state.setup.created;
  return `<div>
    <div class="label" style="margin-top:0">3 camp ads (auto-split ngân sách)</div>
    ${camps.map((c,i)=>`
      <div class="camp-row">
        <div style="flex:1">
          <div class="nm">${c.name}</div>
          <div class="hint2">${c.id} · Budget ${c.budget} · Bid ${c.bid}</div>
        </div>
        <span class="st ${c.st}">${c.st==='run'?'● Running':c.st==='pause'?'❚❚ Paused':'○ Draft'}</span>
        ${allCreated
          ? (c.st==='run'
              ? `<button class="btn amber" onclick="toggleCamp(${i})">Pause</button>`
              : `<button class="btn" onclick="toggleCamp(${i})">Run</button>`)
          : ''}
      </div>`).join("")}
    ${!allCreated
      ? `<div style="margin-top:12px;display:flex;gap:8px">
           <button class="btn" onclick="createCamps()">▶ Tạo tất cả ${camps.length} camp ads</button>
           <button class="btn sec" onclick="toast('Đã lưu draft')">Lưu draft</button>
         </div>`
      : `<div class="doneconfirm" style="margin-top:12px">✓ ${camps.filter(c=>c.st==='run').length} đang chạy · ${camps.filter(c=>c.st==='pause').length} đã pause</div>`}
  </div>`;
}

  const running=state.setup.camps.filter(c=>c.st==='run').length;

  return `<div>
    <div class="success-hero">
      <div class="ic">✓</div>
      <h3>Đã tạo thành công ${state.setup.camps.length} camp ads cho ${state.brief.brand}</h3>
      <p>${running} đang chạy · ${paused} tạm dừng · Audience ${fmt(state.segment.size)} · Budget ${state.brief.budget}M</p>

    <table class="mini">
      <tr><th>Camp ID</th><th>Zone</th><th>Trạng thái</th></tr>
      ${state.setup.camps.map(c=>`<tr><td>${c.id}</td><td>${c.name.split('·').pop().trim()}</td><td>${c.st==='run'?'<span class="pill good">Running</span>':'<span class="pill watch">Paused</span>'}</td></tr>`).join("")}
    </table>
    <div class="done-card" style="margin-top:14px">
      <h4>Tổng quan đầu vào</h4>
      <div class="kv">
        <b>Brand</b><span>${state.brief.brand}</span>
        <b>Objective</b><span><span class="pill aw">${state.brief.objective}</span></span>

        <b>Creative</b><span>${state.creative.fileName||"—"}</span>
      </div>

}

/* ========= STEP 6: REPORT ========= */
function runReport(){
  if(busy) return; busy=true;
  pushStatus("Extract 500 dòng · tính CTR/CPM/VTR · vẽ chart · LLM đánh giá...", STEPS[5].tool);
  setTimeout(()=>{
    clearStatus();
    state.report.analyzed=true;
    pushBot("Phân tích xong ✓ — 312 good / 96 watch / 92 bad. Em vẽ chart và đề xuất 4 hành động ở panel phải.", {tool:STEPS[5].tool, model:STEPS[5].model});
    busy=false;
    renderAll();
    flashWork();
  }, 1500);
}
function renderReport(){
  if(!state.report.analyzed){
    return `<div>
      <div class="label" style="margin-top:0">File báo cáo (mock)</div>
      <div class="drop has"><b>📄 camps_report.csv</b><div style="font-size:11.5px;color:var(--muted);margin-top:4px">500 dòng · 14 cột · cập nhật hôm qua 23:55</div></div>
      <div style="margin-top:14px"><button class="btn" onclick="runReport()">🔍 Phân tích báo cáo</button></div>
    </div>`;
  }
  return reportResultHTML();
}
function reportResultHTML(){
  const weeks=["W1","W2","W3","W4"];
  const reach=[1.2, 1.8, 2.1, 2.4];
  const ctr=[1.1, 1.35, 1.42, 1.58];
  const cpm=[58, 53, 52, 49];
  const W=600, H=230, PL=42, PR=20, PT=20, PB=34;
  const cw=W-PL-PR, ch=H-PT-PB;
  const bw=cw/weeks.length;
  const mxReach=3, mxCpm=70, mxCtr=2;
  function y(v,mx){ return PT+ch-(v/mx)*ch; }
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><g font-family="Inter,system-ui" font-size="10.5" fill="#5b6b60">`;
  for(let i=0;i<=4;i++){ const yy=PT+(ch/4)*i; svg+=`<line x1="${PL}" x2="${W-PR}" y1="${yy}" y2="${yy}" stroke="#eef3f0"/>`; }
  weeks.forEach((w,i)=>{
    const x=PL+bw*i+10;
    const barW=(bw-20)/2;
    const yh=y(reach[i],mxReach);
    svg+=`<rect x="${x}" y="${yh}" width="${barW}" height="${PT+ch-yh}" fill="#1F7A3D" rx="3"/>`;
    svg+=`<text x="${x+barW/2}" y="${yh-4}" text-anchor="middle" font-weight="700" fill="#145C2C">${reach[i]}M</text>`;
    const x2=x+barW+4;
    const yh2=y(cpm[i],mxCpm);
    svg+=`<rect x="${x2}" y="${yh2}" width="${barW}" height="${PT+ch-yh2}" fill="#9A6700" rx="3"/>`;
    svg+=`<text x="${x2+barW/2}" y="${yh2-4}" text-anchor="middle" font-weight="700" fill="#9A6700">${cpm[i]}k</text>`;
    svg+=`<text x="${PL+bw*i+bw/2}" y="${H-12}" text-anchor="middle" font-weight="700">${w}</text>`;
  });
  let path="";
  ctr.forEach((v,i)=>{ const cx=PL+bw*i+bw/2; const cy=PT+ch-(v/mxCtr)*ch; path+=(i===0?"M":"L")+cx+","+cy+" "; });
  svg+=`<path d="${path}" fill="none" stroke="#185FA5" stroke-width="2.5"/>`;
  ctr.forEach((v,i)=>{ const cx=PL+bw*i+bw/2; const cy=PT+ch-(v/mxCtr)*ch; svg+=`<circle cx="${cx}" cy="${cy}" r="3.5" fill="#185FA5"/><text x="${cx+8}" y="${cy-4}" fill="#185FA5" font-weight="700">${v}%</text>`; });
  svg+=`</g></svg>`;
  const good=312, watch=96, bad=92, total=good+watch+bad;
  const C=2*Math.PI*40;
  const gA=(good/total)*C, wA=(watch/total)*C, bA=(bad/total)*C;
  const donut=`<svg viewBox="0 0 120 120" width="110" height="110">
    <circle cx="60" cy="60" r="40" fill="none" stroke="#1F7A3D" stroke-width="18" stroke-dasharray="${gA} ${C-gA}" transform="rotate(-90 60 60)"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="#9A6700" stroke-width="18" stroke-dasharray="${wA} ${C-wA}" stroke-dashoffset="${-gA}" transform="rotate(-90 60 60)"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="#B00020" stroke-width="18" stroke-dasharray="${bA} ${C-bA}" stroke-dashoffset="${-(gA+wA)}" transform="rotate(-90 60 60)"/>
    <text x="60" y="58" text-anchor="middle" font-size="20" font-weight="800" fill="#145C2C" font-family="Inter">500</text>
    <text x="60" y="74" text-anchor="middle" font-size="9" fill="#5b6b60" font-family="Inter">camps</text>
  </svg>`;
  return `<div class="chart-card">
    <h4>Performance theo tuần (Reach · CPM · CTR)</h4>
    ${svg}
    <div class="legend"><span><i style="background:#1F7A3D"></i>Reach (M)</span><span><i style="background:#9A6700"></i>CPM (k VND)</span><span><i style="background:#185FA5"></i>CTR (%)</span></div>
  </div>
  <div class="chart-card" style="display:flex;gap:14px;align-items:center">
    ${donut}
    <div>
      <h4 style="margin-bottom:6px">Verdict 500 camps</h4>
      <div class="kv" style="grid-template-columns:18px 70px 1fr;font-size:12.5px">
        <span style="color:#1F7A3D">●</span><b>Good</b><span>312 · scale +20% ngân sách</span>
        <span style="color:#9A6700">●</span><b>Watch</b><span>96 · theo dõi CTR giảm</span>
        <span style="color:#B00020">●</span><b>Bad</b><span>92 · pause / đổi creative</span>
      </div>
    </div>
  </div>
  <div class="chart-card">
    <h4>🧠 AI Đề xuất hành động</h4>
    <ol style="padding-left:20px;font-size:13.5px;line-height:1.7">
      <li><b>Pause 92 camp 'bad'</b> — ưu tiên 12 camp tiêu lớn nhất (chiếm 64% spend nhóm bad)</li>
      <li><b>Scale 312 camp 'good'</b> +20% budget — CPM giảm dần 58k→49k, Reach tăng đều</li>
      <li><b>Re-test creative</b> cho 96 camp 'watch' — đổi angle "Đặc quyền" → "Trải nghiệm"</li>
      <li><b>Shift budget</b> sang zone Du lịch · CPM thấp nhất, VTR cao nhất</li>
    </ol>
  </div>`;
}

/* ========= STEP 7: EMAIL ========= */
function sendEmail(){
  if(busy) return; busy=true;
  pushStatus("Đang gửi qua SMTP nội bộ Adtima...", STEPS[6].tool);
  setTimeout(()=>{
    clearStatus();
    state.email.sent=true;
    pushBot("Email đã gửi ✓ — Account team & Ad Opt team sẽ nhận trong 1-2 phút. Bấm 'Đồng ý &amp; hoàn tất' để kết thúc quy trình.", {tool:STEPS[6].tool, model:STEPS[6].model});
    busy=false;
    renderAll();
    flashWork();
  }, 900);
}
function renderEmail(){
  const body=`Hi Account & Ad Opt teams,

Camp Ads Agent đã hoàn tất setup + phân tích chiến dịch ${state.brief.brand}.

Tóm tắt:
• ${state.setup.camps.filter(c=>c.st==='run').length}/${state.setup.camps.length} camp đang chạy · Budget ${state.brief.budget}M · ${state.brief.duration} tuần
• Audience: ${fmt(state.segment.size)} người dùng (${state.segment.attrs.length} attributes)
• Performance 500 camp tham chiếu: 312 good · 96 watch · 92 bad

Đề xuất ưu tiên:
1. Pause 92 camp 'bad', ưu tiên 12 camp tiêu lớn
2. Scale +20% budget cho 312 camp 'good'
3. Re-test creative cho 96 camp 'watch'
4. Shift budget sang zone Du lịch

Đính kèm:
- camps_report_analysis.pdf
- setup_plan_${state.brief.brand.replace(/\s/g,"_")}.xlsx

— Camp Ads Agent`;
  return `<div class="email-card">
      <div class="hdr">
        <b>To:</b><span>account@adtima.vn, adopt@adtima.vn</span>
        <b>Cc:</b><span>${state.brief.brand.toLowerCase().replace(/\s/g,"")}-pm@adtima.vn</span>
        <b>Subject:</b><span>[Camp Ads Agent] Báo cáo &amp; đề xuất ${state.brief.brand}</span>
      </div>
      <div class="body">${body}</div>
    </div>
    ${state.email.sent
      ? `<div class="doneconfirm" style="margin-top:12px">✓ Email đã gửi lúc ${new Date().toLocaleTimeString('vi-VN')} — 2 người nhận, 1 cc</div>`
      : `<div style="margin-top:12px;display:flex;gap:8px">
           <button class="btn" onclick="sendEmail()">✉ Gửi email</button>
           <button class="btn sec" onclick="toast('Mở editor chỉnh sửa')">✎ Chỉnh sửa</button>
         </div>`}`;
}

/* ========= LEFT PANE: CHAT ========= */
function renderThread(){
  const t=document.getElementById('thread'); t.innerHTML='';
  log.forEach(m=>{
    if(m.who==='status'){
      const d=document.createElement('div'); d.className='statusbub';
      d.innerHTML='<span class="spin"></span> '+m.html+' <span style="color:var(--green-d);font-weight:700">['+m.tool+']</span>';
      t.appendChild(d); return;
    }
    const w=document.createElement('div'); w.className='msg '+(m.who==='me'?'me':'bot');
    let tool=m.tool?'<div class="tool '+(m.model==='gemma'?'gemma':'')+'">⚙ '+m.tool+' · '+(m.model==='gemma'?'Gemma-4-31b':'Qwen3.6-27b')+'</div>':'';
    let ref=m.ref?`<br><span class="stepref">Xem ở panel phải · ${m.ref}</span>`:'';
    w.innerHTML='<div class="av">'+(m.who==='me'?'Q':'AI')+'</div><div class="bub">'+m.html+ref+tool+'</div>';
    t.appendChild(w);
  });
  scrollEnd();
}

function renderComposer(){
  const i = status.findIndex(s=>s!=='done');
  const allDone = i===-1;
  const sugg = allDone
    ? `<button class="chip" onclick="restart()">↻ Bắt đầu chiến dịch mới</button>`
    : `<button class="chip" onclick="quickAsk('Giải thích kỹ hơn về bước này')">Giải thích thêm</button>
       <button class="chip" onclick="quickAsk('Bước này có rủi ro gì?')">Rủi ro &amp; lưu ý</button>
       <button class="chip" onclick="quickAsk('Cho ví dụ về objective phù hợp')">Cho ví dụ</button>
       ${cur>0?`<button class="chip" onclick="goBack()">← Quay lại bước trước</button>`:''}`;
  document.getElementById('composer').innerHTML = `
    <div class="chips">${sugg}</div>
    <div class="inrow">
      <input type="text" id="chatIn" placeholder="Trao đổi với agent về bước hiện tại...">
      <button class="btn" onclick="sendFreeText()">Gửi</button>
    </div>`;
  const ci=document.getElementById('chatIn');
  if(ci) ci.addEventListener('keydown',e=>{ if(e.key==='Enter') sendFreeText(); });
}

function quickAsk(t){ sendChat(t); }
function sendFreeText(){
  const ci=document.getElementById('chatIn'); if(!ci) return;
  const v=(ci.value||"").trim(); if(!v) return;
  ci.value="";
  sendChat(v);
}
function sendChat(text){
  if(busy) return;
  pushMe(text);
  const s=STEPS[cur];
  // simple keyword reply
  setTimeout(()=>{
    let reply="";
    const t=text.toLowerCase();
    if(t.includes("giải thích")||t.includes("explain")) reply = `Bước <b>${s.title}</b> dùng tool <code>${s.tool}</code>. ${s.desc} Hãy tương tác với form/widget ở panel phải.`;
    else if(t.includes("rủi ro")||t.includes("risk")) reply = `Rủi ro chính ở bước ${s.title}: input không đầy đủ sẽ kéo theo lỗi ở các bước sau. Em đã đặt validation — nút 'Đồng ý' chỉ bật khi đủ dữ liệu.`;
    else if(t.includes("ví dụ")||t.includes("example")) reply = `Ví dụ với objective <b>awareness</b>: KPI nên là Reach + VTR, ngân sách phân bổ 60% banner / 40% video, bid theo CPM tối ưu chia 3 zone.`;
    else if(t.includes("quay lại")||t.includes("back")){ goBack(); return; }
    else if(t.includes("tiếp")||t.includes("next")||t.includes("đồng ý")){ approveCurrent(); return; }
    else reply = `Rõ — em đang ở bước <b>${s.title}</b>. Anh có thể tương tác form ở panel phải, rồi bấm <b>Đồng ý &amp; tiếp tục</b> để chuyển bước.`;
    pushBot(reply, {tool:s.tool, model:s.model});
  }, 350);
}

/* ========= RESTART ========= */
function restart(){
  cur=0;
  status=STEPS.map(()=>'pending');
  busy=false;
  log=[];
  state.creative.uploaded=false; state.creative.fileName=""; state.creative.dataUrl="";
  state.segment.attrs=[]; state.segment.size=0;
  state.setup.camps.forEach(c=>c.st='draft'); state.setup.created=false;
  state.report.analyzed=false; state.email.sent=false;
  renderAll();
  renderComposer();
  pushBot("Chào anh/chị 👋 Em là Camp Ads Agent. " + STEPS[0].intro, {tool:STEPS[0].tool, model:STEPS[0].model, ref:STEPS[0].title});
  flashWork();
}

/* ========= BOOT ========= */
renderAll();
renderComposer();
pushBot("Chào anh/chị 👋 Em là Camp Ads Agent. " + STEPS[0].intro, {tool:STEPS[0].tool, model:STEPS[0].model, ref:STEPS[0].title});
flashWork();

/* Re-render composer when step changes (called via renderAll → done) */
const _origRenderAll = renderAll;
renderAll = function(){ _origRenderAll(); renderComposer(); };
</script>
